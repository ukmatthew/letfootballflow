name = "let-football-flow"
compatibility_date = "2024-06-20"
pages_build_output_dir = "dist"

# D1 database binding. Create the database with:
#   wrangler d1 create lff_db
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "lff_db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# Non-secret vars. Secrets (TURNSTILE_SECRET_KEY, VOTER_HASH_SECRET) should be
# set with `wrangler pages secret put <NAME>` and are NOT committed here.
[vars]
# Set to "1" to require Turnstile verification on votes (recommended in prod).
TURNSTILE_REQUIRED = "0"
